# This workflow will do a clean install of node dependencies, build the source code and run tests against specific node version.

name: CI
node-version: '12.6.1'

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup nodejs version ${{ node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ node-version }}
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test